<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarStore</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>
    <header class="cabecalho">
        <h3>Cadastre seu veículo para vender mais rápido</h3>
    </header>
    <div class="form-container">
        <div class="form-header">
            <p>Formulário</p>
        </div>

        <div class="form-body">
            <h1>Venda fácil seu carro!</h1>
            <p>Descreva as características do seu carro e marque os opcionais que ele possui</p>
            <form onsubmit="salvarCarros(event)">
                <div class="caixaInputs">
                    <!-- Fixed: Added missing opening quote for "title" -->
                    <label for="title">Título do anúncio<span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="title" id="title" placeholder="Um título para anunciar seu carro">
                </div>
                <div class="caixaInputs">
                    <label for="preco">Preço<span class="campo-obrigatorio">*</span></label>
                    <input type="number" name="preco" id="preco" placeholder="Defina o preço">
                </div>
                <div class="caixaInputs">
                    <label for="descricao">Descrição <span class="campo-obrigatorio">*</span></label>
                    <textarea name="descricao" id="descricao" placeholder="Faça a descrição de seu veículo"></textarea>
                </div>
                <div class="caixaInputs">
                    <label for="marca">Marca<span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="marca" id="marca" placeholder="Marca do veículo">
                </div>
                <div class="caixaInputs">
                    <label for="modelo">Modelo<span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="modelo" id="modelo" placeholder="Modelo do veículo">
                </div>

                <div class="caixaInputs">
                    <!-- Fixed: Added missing opening quote for "quilometragem" -->
                    <label for="quilometragem">Quilometragem<span class="campo-obrigatorio">*</span></label>
                    <input type="number" name="quilometragem" id="quilometragem" placeholder="Quilometragem do carro">
                </div>

                <div class="caixaInputs">
                    <label for="data-compra">Data de compra<span class="campo-obrigatorio">*</span></label>
                    <!-- Fixed: Closed the input tag -->
                    <input type="date" name="data-compra" id="data-compra">
                </div>

                <div class="caixaInputs">
                    <p>Tipo de Câmbio: <span class="campo-obrigatorio">*</span></p>
                    <input type="radio" name="marcha" id="manual">
                    <label for="manual">Manual</label>
                    <input type="radio" name="marcha" id="auto">
                    <label for="auto">Automático</label>
                </div>

                <div class="caixaOpicional">
                    <p>Opcionais</p>
                    <ul class="listaOpicionais">
                        <li>
                            <input type="checkbox" name="opicional[]" id="airbag" value="airbag">
                            <label for="airbag">Airbag</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicional[]" id="alarme" value="alarme">
                            <label for="alarme">Alarme</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicional[]" id="arcondicionado" value="arcondicionado">
                            <label for="arcondicionado">Ar condicionado</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicional[]" id="cameradere" value="cameradere">
                            <label for="cameradere">Câmera de ré</label>
                        </li>
                    </ul>
                </div>
                <div class="caixaOpicional">
                    <ul class="listaOpicionais">
                        <li>
                            <input type="checkbox" name="opicional[]" id="assistenciadepista"
                                value="assistenciadepista">
                            <label for="assistenciadepista">Assistência de pista</label>
                        </li>
                    </ul>
                    <li>
                    <input type="checkbox" name="opicional[]" id="partidasemchave" value="partidasemchave">
                    <label for="partidasemchave">Partida sem chave</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opicional[]" id="integracaocomcelular"
                            value="integracaocomcelular">
                        <label for="integracaocomcelular">Integração com celular</label>
                    </li>
                    <li>
                        <input type="checkbox" name="opicional[]" id="bancodecouro" value="bancodecouro">
                        <label for="bancodecouro">Banco de couro</label>
                    </li>
                    <li>
                        <label for="outro">Outro<span></span class="campo-obrigatorio"></label>
                        <input type="text" name="outro" id="outro" placeholder="Outra informação">
                    </li>
                    </ul>
                </div>
                <div class="caixaInputs">
                    <p>Foto do carro <span class="campo-obrigatorio">*</span></p>
                    <!-- Fixed: Added .jpeg and corrected attribute syntax -->
                    <input type="file" name="imagem" id="imagem" multiple accept="image/png, image/jpeg, image/jpg">
                </div>
                <input type="submit" value="Enviar"> class="bnt-submit">
            </form>
            <hr>
            <h2>Carros Cadastrados</h2>
            <div> id="listarCarros"<>/div>
        </div>
    </div>

        <script src="script/script.js"></script>
</body>
</html>
